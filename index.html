<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbu-Comparateur | Metz-Lux-Bel</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛽</text></svg>">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Gas-Finder ⛽</h1>
            <div class="section-label">Prix Nationaux Lux</div>
            <div id="lu-prices">
                <small>Chargement...</small>
            </div>

            <div class="section-label">Carburant souhaité</div>
            <div class="filters">
                <button class="pill active" onclick="setFuel(this,'Diesel')">Diesel</button>
                <button class="pill" onclick="setFuel(this,'SP95')">SP95</button>
                <button class="pill" onclick="setFuel(this,'E10')">E10</button>
                <button class="pill" onclick="setFuel(this,'SP98')">SP98</button>
                <button class="pill" onclick="setFuel(this,'GPL')">GPL</button>
                <button class="pill" onclick="setFuel(this,'E85')">E85</button>
            </div>
            
            <button class="pill" onclick="locateUser()" style="width:100%; margin-top:10px; background:#4b5563;">📍 Me géolocaliser</button>
        </div>

        <div id="station-list">
            </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    
    <script src="app.js"></script>

</body>
</html>
